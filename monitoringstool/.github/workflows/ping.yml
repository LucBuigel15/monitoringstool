name: Ping Health Check

on:
  schedule:
    # Run every 15 minutes to keep server warm
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server health
        run: |
          curl -s -o /dev/null -w "%{http_code}" ${{ secrets.SERVER_URL }}/api/health || true
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}